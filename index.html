<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Filmlabor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; margin:0; }

.landing {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
  background:#fafafa;
}

.landing h1 { font-size:28px; margin-bottom:10px; }
.landing p { color:#666; margin-bottom:30px; }

.landing button {
  padding:15px 25px;
  margin:10px;
  font-size:16px;
}

.app { display:none; padding:15px; }

.dashboard { border:1px solid #000; padding:10px; margin-bottom:15px; }

.film { border:1px solid #ccc; padding:10px; margin-bottom:10px; }

button { padding:10px; margin:5px; }

</style>
</head>

<body>

<!-- LANDING -->
<div class="landing" id="landing">
  <h1>📷 Filmlabor</h1>
  <p>Analoges Labor – Aufträge verwalten</p>

  <button onclick="enterApp()">📷 Auftrag scannen</button>
  <button onclick="enterApp()">📋 Labor öffnen</button>
</div>

<!-- APP -->
<div class="app" id="app">

<h2>Filmlabor</h2>

<button onclick="startScanner()">Scan</button>
<button onclick="printLabels()">Etiketten</button>

<div id="dashboard"></div>

<h3>Aufträge</h3>
<div id="orders"></div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
function enterApp(){
  document.getElementById("landing").style.display="none";
  document.getElementById("app").style.display="block";
  renderStored();
}

// --- bestehende Logik gekürzt aber funktionsfähig ---

const FilmStatus = ["Eingegangen","Fertig"];

function generateOrderNumber(){
  const d=new Date();
  const date =
    d.getFullYear().toString().slice(2)+
    String(d.getMonth()+1).padStart(2,"0")+
    String(d.getDate()).padStart(2,"0");

  let orders = JSON.parse(localStorage.getItem("orders")||"[]");

  let max=0;
  orders.forEach(o=>{
    if(o.orderNumber && o.orderNumber.startsWith("FL-"+date)){
      const num=parseInt(o.orderNumber.split("-")[2]);
      if(num>max) max=num;
    }
  });

  return "FL-"+date+"-"+String(max+1).padStart(3,"0");
}

function startScanner(){
  const scanner=new Html5Qrcode("app");

  scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
    text=>{
      scanner.stop();
      handleQR(text);
    }
  );
}

function handleQR(text){
  try{
    const data=JSON.parse(text);
    const order=generateOrder(data);
    saveOrder(order);
    renderStored();
  }catch{
    alert("QR Fehler");
  }
}

function generateOrder(data){
  const orderNumber=generateOrderNumber();

  return {
    orderNumber,
    name:data.name||"Unbekannt",
    films:(data.films||[]).map((f,i)=>({
      filmNumber:orderNumber+"-"+String(i+1).padStart(2,"0"),
      status:"Eingegangen"
    }))
  };
}

function saveOrder(order){
  let orders=JSON.parse(localStorage.getItem("orders")||"[]");
  orders.unshift(order);
  localStorage.setItem("orders",JSON.stringify(orders));
}

function renderStored(){
  let orders=JSON.parse(localStorage.getItem("orders")||"[]");
  const container=document.getElementById("orders");
  container.innerHTML="";

  let total=0, fertig=0;

  orders.forEach((o,i)=>{
    const div=document.createElement("div");
    div.innerHTML="<strong>"+o.orderNumber+"</strong><br>"+o.name;

    o.films.forEach((f,j)=>{
      total++;
      if(f.status==="Fertig") fertig++;

      const fDiv=document.createElement("div");
      fDiv.className="film";
      fDiv.innerHTML=`
        ${f.filmNumber}<br>
        <select onchange="updateStatus(${i},${j},this.value)">
          ${FilmStatus.map(s=>`<option ${s===f.status?"selected":""}>${s}</option>`).join("")}
        </select>
      `;
      div.appendChild(fDiv);
    });

    container.appendChild(div);
  });

  document.getElementById("dashboard").innerHTML=
    "Gesamt: "+total+" | Offen: "+(total-fertig)+" | Fertig: "+fertig;
}

function updateStatus(o,f,v){
  let orders=JSON.parse(localStorage.getItem("orders"));
  orders[o].films[f].status=v;
  localStorage.setItem("orders",JSON.stringify(orders));
  renderStored();
}

function printLabels(){
  window.print();
}
</script>

</body>
</html>
