<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Filmlabor PWA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; margin: 15px; }
#reader { max-width:400px; margin-bottom:20px; }
.film { border:1px solid #ccc; padding:10px; margin-bottom:10px; }
button { padding:10px; margin:5px 5px 5px 0; }
.dashboard { padding:10px; border:1px solid #000; margin-bottom:15px; }
.print-area { display:none; }
@media print {
  body * { display:none; }
  .print-area, .print-area * { display:block; }
}
</style>
</head>

<body>

<h2>📷 Filmlabor</h2>

<button onclick="startScanner()">Scan starten</button>
<button onclick="printLabels()">Etiketten drucken</button>
<button onclick="exportData()">Backup speichern</button>
<button onclick="importData()">Backup laden</button>
<input type="file" id="fileInput" style="display:none" onchange="loadFile(event)">

<div id="reader"></div>

<div class="dashboard" id="dashboard"></div>

<h3>Filter</h3>
<select id="filter" onchange="renderStored()">
<option value="all">Alle</option>
<option value="offen">Offen</option>
<option value="fertig">Fertig</option>
</select>

<h3>Aufträge</h3>
<div id="orders"></div>

<h3>📓 Laborjournal</h3>
<div id="journal"></div>

<div class="print-area" id="printArea"></div>

<script>
const FilmStatus = ["Eingegangen","Entwickelt","Gescannt","Fertig"];

function generateOrderNumber(){
  const d = new Date();
  const date =
    d.getFullYear().toString().slice(2) +
    String(d.getMonth()+1).padStart(2,"0") +
    String(d.getDate()).padStart(2,"0");

  let orders = JSON.parse(localStorage.getItem("orders") || "[]");

  const todayOrders = orders.filter(o => {
    if(!o.orderNumber) return false;
    return o.orderNumber.startsWith("FL-" + date);
  });

  let max = 0;
  todayOrders.forEach(o => {
    const parts = o.orderNumber.split("-");
    const num = parseInt(parts[2]);
    if(num > max) max = num;
  });

  const next = max + 1;
  return "FL-" + date + "-" + String(next).padStart(3,"0");
}

function startScanner(){
  const scanner = new Html5Qrcode("reader");
  scanner.start({ facingMode: "environment" }, { fps:10, qrbox:250 },
    (text) => {
      scanner.stop();
      handleQR(text);
    }
  );
}

function handleQR(text){
  try {
    const data = JSON.parse(text);
    const order = generateOrder(data);
    saveOrder(order);
    renderStored();
  } catch(e){
    alert("QR ungültig");
  }
}

function generateOrder(data){
  const orderNumber = generateOrderNumber();

  const films = (data.films || []).map((f,i)=>({
    type: f.type || "Unbekannt",
    format: f.format || "Unbekannt",
    scan: f.scan || false,
    filmNumber: orderNumber + "-" + String(i+1).padStart(2,"0"),
    status: "Eingegangen"
  }));

  return {
    orderNumber: orderNumber,
    name: data.name || "Unbekannt",
    createdAt: new Date().toISOString(),
    films: films
  };
}

function saveOrder(order){
  let orders = JSON.parse(localStorage.getItem("orders")||"[]");
  orders.unshift(order);
  localStorage.setItem("orders", JSON.stringify(orders));
}

function renderStored(){
  const container = document.getElementById("orders");
  container.innerHTML = "";

  let orders = JSON.parse(localStorage.getItem("orders")||"[]");
  const filter = document.getElementById("filter").value;

  let total = 0;
  let fertig = 0;

  orders.forEach((order, oIndex)=>{
    const div = document.createElement("div");
    div.innerHTML = "<h4>"+order.orderNumber+" – "+order.name+"</h4>";

    order.films.forEach((film,fIndex)=>{
      total++;
      if(film.status==="Fertig") fertig++;

      if(filter==="offen" && film.status==="Fertig") return;
      if(filter==="fertig" && film.status!=="Fertig") return;

      const fDiv = document.createElement("div");
      fDiv.className="film";

      fDiv.innerHTML = `
        <strong>${film.filmNumber}</strong><br>
        ${film.type} – ${film.format}<br>
        <select onchange="updateStatus(${oIndex},${fIndex}, this.value)">
          ${FilmStatus.map(s=>`<option ${s===film.status?"selected":""}>${s}</option>`).join("")}
        </select>
      `;

      div.appendChild(fDiv);
    });

    container.appendChild(div);
  });

  document.getElementById("dashboard").innerHTML = `
    <strong>Dashboard</strong><br>
    Gesamt: ${total}<br>
    Offen: ${total - fertig}<br>
    Fertig: ${fertig}
  `;

  renderJournal();
}

function renderJournal(){
  const container = document.getElementById("journal");
  container.innerHTML = "";

  let orders = JSON.parse(localStorage.getItem("orders")||"[]");

  orders.forEach(order => {
    const date = new Date(order.createdAt || Date.now()).toLocaleString("de-DE");
    const totalFilms = order.films.length;
    const fertig = order.films.filter(f => f.status === "Fertig").length;

    const div = document.createElement("div");
    div.className = "film";

    div.innerHTML = `
      <strong>${order.orderNumber}</strong><br>
      ${order.name}<br>
      Datum: ${date}<br>
      Filme: ${totalFilms}<br>
      Status: ${fertig}/${totalFilms} fertig
    `;

    container.appendChild(div);
  });
}

function updateStatus(o,f,value){
  let orders = JSON.parse(localStorage.getItem("orders"));
  orders[o].films[f].status = value;
  localStorage.setItem("orders", JSON.stringify(orders));
  renderStored();
}

function printLabels(){
  const orders = JSON.parse(localStorage.getItem("orders")||"[]");
  const printArea = document.getElementById("printArea");
  printArea.innerHTML = "";

  orders.forEach(order=>{
    order.films.forEach(film=>{
      const div = document.createElement("div");
      div.style.marginBottom = "10px";
      div.innerHTML = `<strong>${film.filmNumber}</strong>`;
      printArea.appendChild(div);
    });
  });

  window.print();
}

function exportData(){
  const data = localStorage.getItem("orders") || "[]";
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "filmlabor-backup.json";
  a.click();
  URL.revokeObjectURL(url);
}

function importData(){
  document.getElementById("fileInput").click();
}

function loadFile(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = JSON.parse(e.target.result);
      localStorage.setItem("orders", JSON.stringify(data));
      renderStored();
      alert("Backup geladen");
    } catch {
      alert("Fehlerhafte Datei");
    }
  };
  reader.readAsText(file);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

renderStored();
</script>

</body>
</html>
