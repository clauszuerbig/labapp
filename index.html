<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Filmlabor Pro Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {margin:0;font-family:-apple-system;background:#f2f2f2;}
.header{padding:15px;background:white;border-bottom:1px solid #ddd;}
.container{display:grid;grid-template-columns:1fr 2fr;height:100vh;}
.sidebar{background:white;padding:10px;border-right:1px solid #ddd;}
.main{padding:20px;}

#scannerOverlay{
 position:fixed;
 inset:0;
 background:black;
 display:none;
 z-index:9999;
}

#reader{
 width:100%;
 height:100%;
 position:relative;
}

.scan-frame{
 position:absolute;
 top:50%;
 left:50%;
 width:250px;
 height:250px;
 transform:translate(-50%,-50%);
 border:2px solid white;
 box-shadow:0 0 0 9999px rgba(0,0,0,0.5);
}

button{padding:10px;margin-top:10px;}
.card{background:white;padding:10px;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="header">Filmlabor Pro</div>

<div class="container">

<div class="sidebar">
<button onclick="startScanner()">📷 Scan</button>
<div id="orderList"></div>
</div>

<div class="main">
<div id="detail"></div>
</div>

</div>

<!-- Scanner Overlay -->
<div id="scannerOverlay">
  <div id="reader">
    <div class="scan-frame"></div>
  </div>
  <button onclick="stopScanner()" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);">
    Abbrechen
  </button>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let scanner;
let scanning=false;

function startScanner(){
 document.getElementById("scannerOverlay").style.display="block";

 scanner=new Html5Qrcode("reader");
 scanning=true;

 scanner.start(
  {facingMode:"environment"},
  {fps:10,qrbox:250},
  async(text)=>{
    if(!scanning) return;
    scanning=false;

    await scanner.stop();
    document.getElementById("scannerOverlay").style.display="none";

    handleQR(text);
  }
 );
}

function stopScanner(){
 scanning=false;
 if(scanner){
  scanner.stop().catch(()=>{});
 }
 document.getElementById("scannerOverlay").style.display="none";
}

function handleQR(text){
 try{
  const data=JSON.parse(text);
  alert("QR OK: "+data.name);
 }catch{
  alert("QR gelesen: "+text);
 }
}

</script>

</body>
</html>
